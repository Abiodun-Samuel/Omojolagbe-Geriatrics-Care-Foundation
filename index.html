<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1712" />

    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <!--
      Title and description are intentionally not set here. React 19 hoists
      them from each route's Seo component and appends rather than replaces, so
      a static default would leave two of each. The Seo component is the single
      source of truth for per-route metadata.
    -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
